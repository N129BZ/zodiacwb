<!doctype html>
<html lang="en">
  <head>
    <title>Zenith 601xl/650 Weight and Balance</title>
    <link rel="stylesheet" type="text/css" href="index.css" />
  </head>
  <body>
    <div class="container" id="container">
      <svg
        width="370"
        height="360"
        viewBox="0 0 370 360"
        version="1.1"
        id="wbcontainer"
        inkscape:version="1.2.2 (b0a8486541, 2022-12-01)"
        sodipodi:docname="chart.svg"
        xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
        xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
        xmlns="http://www.w3.org/2000/svg"
        xmlns:svg="http://www.w3.org/2000/svg">
        <sodipodi:namedview
          id="namedview7"
          pagecolor="#ffffff"
          bordercolor="#000000"
          borderopacity="0.25"
          inkscape:showpageshadow="2"
          inkscape:pageopacity="0.0"
          inkscape:pagecheckerboard="0"
          inkscape:deskcolor="#d1d1d1"
          inkscape:document-units="px"
          showgrid="false"
          inkscape:zoom="1.4307099"
          inkscape:cx="363.45594"
          inkscape:cy="219.82095"
          inkscape:window-width="1920"
          inkscape:window-height="976"
          inkscape:window-x="0"
          inkscape:window-y="34"
          inkscape:window-maximized="1"
          inkscape:current-layer="layer1" />
        <defs
          id="defs2" />
        <g
          inkscape:label="Layer 1"
          inkscape:groupmode="layer"
          id="layer1">
          <path
            style="fill:#e6e6e6"
            d="M 0.22861896,142.02374 129.46855,0.64931794 369.97471,1.2848991 369.97203,360.35838 0.08133272,360.50172 Z"
            id="wbpath" />
        </g>
      </svg>
      <label class="nglimit" id="nglimit">Nose gear structural limit</label>
      <label class="w720" id="w720">720 --</label>
      <label class="w1080" id="w1080">1080 --</label>
      <label class="w1320" id="w1320">1320 -----------------------------------------</label>
      <label class="a270" id="a270">270-</label>
      <label class="a455" id="a455">455-</label>
      <div id="dot"></div>
      <label class="myplane" id="myplane">(x|y)</label>
      <label class="ylegend">Weight (in lbs)</label>
      <label class="xlegend">Acceptable CG Range (in mm)</label>
    </div>
    <div class="questions" id="questions">  
      <label class="weighthdr1" style="left:388">WEIGHT</label><label class="weighthdr2">ARM</label><label class="weighthdr3">MOMENT</label>
      <br />
      <label for="mgw" class="weightLabel">Max Gross:</label>
      <input type="text" class="weight" id="mgw" value="0" readonly="true">
      <br />
      <label for="rm" class="weightLabel">Right Main:</label>
      <input type="text" class="weight" id="rm" value="0" oninput="calcWB(this)"> x <input type="text" class="weight" id="rma" value="0" oninput="calcWB(this)"> = <input type="text" class="weight" id="rmm" value="0" readonly="true">
      <br />
      <label for="lm" class="weightLabel">Left Main:</label>
      <input type="text" class="weight" id="lm" value="0" oninput="calcWB(this)"> x <input type="text" class="weight" id="lma" value="0" oninput="calcWB(this)"> = <input type="text" class="weight" id="lmm" value="0" readonly="true">
      <br />
      <label for="nw" class="weightLabel">Nose Wheel:</label>
      <input type="text" class="weight" id="nw" value="0" oninput="calcWB(this)"> x <input type="text" class="weight" id="nwa" value="0" oninput="calcWB(this)"> = <input type="text" class="weight" id="nwm" value="0" readonly="true">
      <br />
      <label class="underline">----------------------------------------------------------------</label>
      <br />
      <label for="ew" class="weightLabel">Empty Weight:</label>
      <input type="text" class="cogweight" id="ewt" value="0"> CG = <input type="text" class="cogcg" id="ecg" value="0" readonly="true"><input type="text" class="cogmoment" id="emom" value="0" readonly="true">
      <br />
      <label class="underline">----------------------------------------------------------------</label>
      <br />
      <label for="piw" class="weightLabel">Pilot:</label>
      <input type="text" class="weight" id="piw" value="0" oninput="calcWB(this)"> x <input type="text" class="weight" id="pia" value="0" oninput="calcWB()"> = <input type="text" class="weight" id="pim" value="0" readonly="true">
      <br />
      <label for="paw" class="weightLabel">Passenger:</label>
      <input type="text" class="weight" id="paw" value="0" oninput="calcWB(this)"> x <input type="text" class="weight" id="paa" value="0" oninput="calcWB()"> = <input type="text" class="weight" id="pam" value="0" readonly="true">
      <br />
      <label for="rwl" class="weightLabel">Right Wing Locker:</label>
      <input type="text" class="weight" id="rwl" value="0" oninput="calcWB(this)"> x <input type="text" class="weight" id="rwla" value="0" oninput="calcWB()"> = <input type="text" class="weight" id="rwlm" value="0" readonly="true">
      <br />
      <label for="lwl" class="weightLabel">Left Wing Locker:</label>
      <input type="text" class="weight" id="lwl" value="0" oninput="calcWB(this)"> x <input type="text" class="weight" id="lwla" value="0" oninput="calcWB()"> = <input type="text" class="weight" id="lwlm" value="0" readonly="true">
      <br />
      <div class="fuel">
        <label for="fig" class="fuelabel">Fuel in Gallons:</label><input type="text" class="fuelgals" id="fig" value="0" oninput="calcFuel()">: <input type="text" class="fuelwt" id="fwt" value="0" readonly="true"> x <input type="text" class="fuelarm" id="fua" value="0" oninput="calcWB()"> = <input type="text" class="fuelmoment" id="fum" value="0" readonly="true">
      </div>
      <br />
      <label for="rb" class="weightLabel">Rear Baggage:</label>
      <input type="text" class="weight" id="rb" value="0" oninput="calcWB(this)"> x <input type="text" class="weight" id="rba" value="0" oninput="calcWB()"> = <input type="text" class="weight" id="rbm" value="0" readonly="true">
      <br />
      <label class="underline">----------------------------------------------------------------</label>
      <br />
      <label for="totwt" class="weightLabel">Totals:</label>
      <input type="text" class="cogweight" id="totwt" value="0"> CG = <input type="text" class="cogcg" id="totcg" value="0" readonly="true"><input type="text" class="cogmoment" id="totmom" value="0" readonly="true">
      <br />
      <br />
      <label for="cog" class="weightLabel">CG Coordinates:</label>
      <input type="text" class="coords" id="cog" value="(0|0)" readonly="true">
    </div>
    <div><button id="savebutton" disabled onclick="saveConfig()" >Save</button></div>
    <script type="text/javascript" src="wandb.js"></script>
  </body>
</html>
